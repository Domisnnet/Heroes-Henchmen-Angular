<app-header [message]="'🦸 Escolha com cuidado... estamos observando 👀'" />
<section class="quiz">
  <main class="quiz__content">
    <div class="quiz__card">
      <h3 class="quiz__question">{{ currentQuestion.question }}</h3>
      @for (answer of currentQuestion.answers; track answer.id) {
        <button class="quiz__card-button" (click)="answer(answer)">{{ answer.text }}</button>
      }
    </div>
  </main>
</section>
<app-footer [message]="'⚡ Sua personalidade está sendo analisada'" />
